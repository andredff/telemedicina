<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teleconsulta Novità</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #f0f7ee 0%, #ffffff 100%);
    }
    
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      background: linear-gradient(135deg, #2B5A3F 0%, #3D7A56 100%);
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    
    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo-icon svg {
      width: 20px;
      height: 20px;
      fill: white;
    }
    
    .header-title {
      font-size: 18px;
      font-weight: 600;
    }
    
    .header-badge {
      background: rgba(255, 255, 255, 0.2);
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    
    .waiting-room {
      text-align: center;
      max-width: 480px;
    }
    
    .waiting-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #2B5A3F 0%, #3D7A56 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    
    .waiting-icon svg {
      width: 40px;
      height: 40px;
      fill: white;
    }
    
    .waiting-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    
    .waiting-description {
      font-size: 16px;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    
    .waiting-status {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      border: 1px solid #e5e7eb;
    }
    
    .status-row {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .status-row:last-child {
      border-bottom: none;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #10b981;
      animation: blink 1.5s ease-in-out infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    
    .status-text {
      font-size: 14px;
      color: #6b7280;
      text-align: left;
    }
    
    .status-value {
      font-size: 14px;
      font-weight: 600;
      color: #2B5A3F;
      text-align: right;
    }
    
    .info-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 24px;
    }
    
    .info-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      text-align: left;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      border: 1px solid #e5e7eb;
    }
    
    .info-card-icon {
      width: 32px;
      height: 32px;
      background: #f0f7ee;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }
    
    .info-card-icon svg {
      width: 18px;
      height: 18px;
      fill: #2B5A3F;
    }
    
    .info-card-title {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    
    .info-card-desc {
      font-size: 12px;
      color: #6b7280;
    }
    
    .enter-button {
      margin-top: 24px;
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, #2B5A3F 0%, #3D7A56 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .enter-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(43, 90, 63, 0.4);
    }
    
    .enter-button:active {
      transform: translateY(0);
    }
    
    .enter-button svg {
      width: 20px;
      height: 20px;
    }
    
    .enter-button.hidden {
      display: none;
    }
    
    /* Iframe container for actual consultation */
    .consultation-frame {
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .hidden {
      display: none;
    }
    
    /* Responsive */
    @media (max-width: 640px) {
      .header {
        padding: 12px 16px;
      }
      
      .header-title {
        font-size: 16px;
      }
      
      .waiting-title {
        font-size: 20px;
      }
      
      .waiting-description {
        font-size: 14px;
      }
      
      .info-cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="currentColor"/>
          </svg>
        </div>
        <span class="header-title">Novità Telemedicina</span>
      </div>
      <span class="header-badge" id="consultationType">Consulta Imediata</span>
    </header>
    
    <div class="content" id="waitingRoom">
      <div class="waiting-room">
        <div class="waiting-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z" fill="currentColor"/>
          </svg>
        </div>
        
        <h1 class="waiting-title">Sala de Espera</h1>
        
        <div class="waiting-status">
          <div class="status-row">
            <span class="status-dot"></span>
            <span class="status-text">Status</span>
            <span class="status-value" id="statusText">Na sala de espera</span>
          </div>
          <div class="status-row">
            <span></span>
            <span class="status-text">Especialidade</span>
            <span class="status-value" id="specialtyText">Clínico Geral</span>
          </div>
          <div class="status-row">
            <span></span>
            <span class="status-text">ID Atendimento</span>
            <span class="status-value" id="attendanceId">-</span>
          </div>
        </div>
        
        <button id="enterButton" class="enter-button hidden" onclick="enterConsultation()">
          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
          </svg>
          Entrar na Videochamada
        </button>
        
        <div class="info-cards">
          <div class="info-card">
            <div class="info-card-icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
              </svg>
            </div>
            <div class="info-card-title">Câmera e Microfone</div>
            <div class="info-card-desc">Mantenha ligados durante a consulta</div>
          </div>
          
          <div class="info-card">
            <div class="info-card-icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
              </svg>
            </div>
            <div class="info-card-title">Ambiente Silencioso</div>
            <div class="info-card-desc">Escolha um local tranquilo</div>
          </div>
          
          <div class="info-card">
            <div class="info-card-icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12z"/>
              </svg>
            </div>
            <div class="info-card-title">Conexão Estável</div>
            <div class="info-card-desc">Use Wi-Fi ou 4G/5G</div>
          </div>
          
          <div class="info-card">
            <div class="info-card-icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-4H6v-2h4V7h2v4h4v2h-4v4z"/>
              </svg>
            </div>
            <div class="info-card-title">Documentos</div>
            <div class="info-card-desc">Tenha exames em mãos</div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Iframe para a consulta real quando conectado -->
    <iframe id="consultationFrame" class="consultation-frame hidden" allow="camera; microphone; fullscreen; display-capture"></iframe>
  </div>
  
  <script>
    // Recebe parâmetros da URL
    const params = new URLSearchParams(window.location.search);
    const atendimentoId = params.get('atendimentoId');
    const token = params.get('token');
    const tipo = params.get('tipo') || 'imediata';
    const especialidade = params.get('especialidade') || 'Clínico Geral';
    const isSandbox = params.get('sandbox') === 'true';
    
    // Atualiza UI com informações
    document.getElementById('consultationType').textContent = 
      tipo === 'imediata' ? 'Consulta Imediata' : 'Consulta Agendada';
    document.getElementById('specialtyText').textContent = especialidade;
    
    if (atendimentoId) {
      document.getElementById('attendanceId').textContent = '#' + atendimentoId;
    }
    
    // URL base da sala Assemed
    const baseUrl = isSandbox
      ? 'https://dev-app-assemed.azurewebsites.net'
      : 'https://app.assemedtelemedicina.com';
    
    // URL da consulta para uso posterior
    let consultationUrl = null;
    
    // Se tiver atendimentoId e token, prepara a URL e mostra botão
    if (atendimentoId && token) {
      consultationUrl = `${baseUrl}/sala-espera-externa/${atendimentoId}?token=${encodeURIComponent(token)}`;
      document.getElementById('enterButton').classList.remove('hidden');
    }
    
    // Função para entrar na videochamada
    function enterConsultation() {
      if (consultationUrl) {
        const waitingRoom = document.getElementById('waitingRoom');
        const consultationFrame = document.getElementById('consultationFrame');
        
        consultationFrame.src = consultationUrl;
        consultationFrame.classList.remove('hidden');
        waitingRoom.classList.add('hidden');
      }
    }
    
    // Comunicação com o parent window
    window.addEventListener('message', function(event) {
      if (event.data.type === 'CONSULTATION_STATUS') {
        document.getElementById('statusText').textContent = event.data.status || 'Aguardando';
      }
      
      if (event.data.type === 'START_CONSULTATION') {
        const { atendimentoId, token, especialidade } = event.data;
        consultationUrl = `${baseUrl}/sala-espera-externa/${atendimentoId}?token=${encodeURIComponent(token)}`;
        
        document.getElementById('attendanceId').textContent = '#' + atendimentoId;
        document.getElementById('specialtyText').textContent = especialidade || 'Clínico Geral';
        document.getElementById('enterButton').classList.remove('hidden');
      }
      
      // Quando o profissional entrar, entrar automaticamente
      if (event.data.type === 'PROFESSIONAL_JOINED') {
        enterConsultation();
      }
      
      if (event.data.type === 'CLOSE_CONSULTATION') {
        window.parent.postMessage({ type: 'CONSULTATION_CLOSED' }, '*');
      }
    });
    
    // Notifica parent que iframe está pronto
    window.parent.postMessage({ type: 'IFRAME_READY' }, '*');
  </script>
</body>
</html>
